<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GrayNostr — Grayscale Nostr Client</title>
  <style>
    :root {
      --bg: #f4f4f4;
      --panel: #ffffff;
      --panel-2: #ededed;
      --text: #111111;
      --muted: #6b6b6b;
      --border: #d1d1d1;
      --strong: #000000;
      --hover: #e7e7e7;
      --shadow: 0 1px 0 rgba(0,0,0,.08), 0 10px 30px rgba(0,0,0,.06);
      --radius: 18px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #070707;
        --panel: #111111;
        --panel-2: #1b1b1b;
        --text: #f2f2f2;
        --muted: #9a9a9a;
        --border: #303030;
        --strong: #ffffff;
        --hover: #191919;
        --shadow: 0 1px 0 rgba(255,255,255,.05), 0 10px 30px rgba(0,0,0,.32);
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    button, textarea, input { font: inherit; }
    .app { max-width: 1180px; margin: 0 auto; display: grid; grid-template-columns: 260px minmax(0, 1fr) 320px; min-height: 100vh; }
    .sidebar, .aside { position: sticky; top: 0; height: 100vh; padding: 18px 14px; }
    .main { border-left: 1px solid var(--border); border-right: 1px solid var(--border); background: var(--panel); min-height: 100vh; }
    .brand { display: flex; align-items: center; gap: 12px; padding: 10px 12px 22px; }
    .logo { width: 42px; height: 42px; border: 2px solid var(--strong); border-radius: 50%; display: grid; place-items: center; font-weight: 900; }
    .brand h1 { margin: 0; font-size: 22px; letter-spacing: -.03em; }
    .nav button, .primary, .ghost { width: 100%; border: 1px solid transparent; border-radius: 999px; padding: 13px 16px; background: transparent; color: var(--text); text-align: left; cursor: pointer; font-weight: 650; }
    .nav button:hover, .ghost:hover { background: var(--hover); }
    .primary { background: var(--strong); color: var(--bg); text-align: center; margin-top: 14px; }
    .primary:disabled { opacity: .35; cursor: not-allowed; }
    .profile-card, .box { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; margin-bottom: 14px; }
    .header { position: sticky; top: 0; z-index: 5; backdrop-filter: blur(14px); background: color-mix(in srgb, var(--panel) 88%, transparent); border-bottom: 1px solid var(--border); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
    .header h2 { margin: 0; font-size: 20px; letter-spacing: -.02em; }
    .status { font-size: 12px; color: var(--muted); }
    .composer { padding: 16px 18px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 48px 1fr; gap: 12px; }
    .avatar { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(135deg, #d8d8d8, #777); filter: grayscale(1); border: 1px solid var(--border); object-fit: cover; }
    textarea { width: 100%; min-height: 92px; resize: vertical; border: 0; outline: none; background: transparent; color: var(--text); font-size: 20px; line-height: 1.45; }
    .composer-actions { display: flex; justify-content: space-between; align-items: center; gap: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
    .counter { color: var(--muted); font-size: 13px; }
    .feed { min-height: 400px; }
    .note { display: grid; grid-template-columns: 48px 1fr; gap: 12px; padding: 16px 18px; border-bottom: 1px solid var(--border); }
    .note:hover { background: var(--hover); }
    .note-head { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
    .name { font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pubkey, .time { color: var(--muted); font-size: 13px; white-space: nowrap; }
    .content { white-space: pre-wrap; overflow-wrap: anywhere; line-height: 1.48; margin-top: 4px; }
    .note-actions { display: flex; gap: 34px; margin-top: 11px; color: var(--muted); font-size: 13px; }
    .tiny { font-size: 12px; color: var(--muted); line-height: 1.55; }
    label { display: block; color: var(--muted); font-size: 12px; font-weight: 700; margin: 10px 0 5px; }
    input { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; color: var(--text); background: var(--panel-2); outline: none; }
    .relay-list { display: grid; gap: 8px; margin-top: 8px; }
    .relay { display: flex; align-items: center; justify-content: space-between; gap: 8px; border: 1px solid var(--border); border-radius: 12px; padding: 8px 10px; color: var(--muted); font-size: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #888; display: inline-block; margin-right: 6px; }
    .toast { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%); background: var(--strong); color: var(--bg); padding: 11px 15px; border-radius: 999px; opacity: 0; pointer-events: none; transition: opacity .18s; z-index: 20; }
    .toast.show { opacity: 1; }
    a { color: inherit; }
    @media (max-width: 980px) { .app { grid-template-columns: 76px minmax(0, 1fr); } .aside { display: none; } .brand h1, .nav span { display: none; } .nav button { text-align: center; padding: 13px 0; } }
    @media (max-width: 640px) { .app { display: block; } .sidebar { display: none; } .main { border: 0; } .composer, .note { grid-template-columns: 40px 1fr; padding-left: 14px; padding-right: 14px; } .avatar { width: 40px; height: 40px; } }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><div class="logo">N</div><h1>GrayNostr</h1></div>
      <nav class="nav">
        <button id="homeBtn">⌂ <span>ホーム</span></button>
        <button id="refreshBtn">↻ <span>再読込</span></button>
        <button id="copyPubkeyBtn">⌘ <span>公開鍵をコピー</span></button>
      </nav>
      <button class="primary" id="connectBtn">NIP-07 で接続</button>
      <button class="ghost" id="localKeyBtn">ローカル鍵を作成</button>
    </aside>

    <main class="main">
      <header class="header">
        <h2>ホーム</h2>
        <div class="status" id="connectionStatus">未接続</div>
      </header>
      <section class="composer">
        <img id="myAvatar" class="avatar" alt="avatar" />
        <div>
          <textarea id="postText" maxlength="280" placeholder="いまどうしてる？"></textarea>
          <div class="composer-actions">
            <span class="counter"><span id="charCount">0</span>/280</span>
            <button class="primary" id="postBtn" style="width:auto; min-width:110px; margin:0;" disabled>投稿</button>
          </div>
        </div>
      </section>
      <section class="feed" id="feed"></section>
    </main>

    <aside class="aside">
      <div class="profile-card">
        <strong id="profileName">匿名ユーザー</strong>
        <p class="tiny" id="profilePubkey">未ログイン</p>
        <p class="tiny">ログイン後、Nostr の kind:3 フォローリストを取得し、フォロー中アカウントの kind:1 テキストノートだけを複数リレーから表示します。</p>
      </div>
      <div class="box">
        <strong>Relays</strong>
        <div class="relay-list" id="relayList"></div>
        <label for="relayInput">リレー追加</label>
        <input id="relayInput" placeholder="wss://relay.example.com" />
        <button class="ghost" id="addRelayBtn" style="margin-top:8px;">追加</button>
      </div>
      <div class="box tiny">
        <strong>注意</strong><br />ローカル鍵は localStorage に保存されます。本格運用では NIP-07 拡張または外部署名器を推奨します。フォローリストがリレー上で見つからない場合、タイムラインは空になります。
      </div>
    </aside>
  </div>
  <div class="toast" id="toast"></div>

  <script type="module">
    import { SimplePool, finalizeEvent, generateSecretKey, getPublicKey, nip19 } from 'https://esm.sh/nostr-tools@2.15.0';
    import { bytesToHex, hexToBytes } from 'https://esm.sh/@noble/hashes@1.8.0/utils';

    const DEFAULT_RELAYS = [
      'wss://yabu.me',
      'wss://r.kojira.io'
    ];

    const state = {
      pool: new SimplePool(),
      relays: JSON.parse(localStorage.getItem('mono:relays') || 'null') || DEFAULT_RELAYS,
      pubkey: localStorage.getItem('mono:pubkey') || null,
      secretHex: localStorage.getItem('mono:secretHex') || null,
      metadata: new Map(),
      events: new Map(),
      follows: [],
      followSub: null,
      sub: null
    };

    const $ = (id) => document.getElementById(id);
    const feed = $('feed');
    const postText = $('postText');
    const postBtn = $('postBtn');

    function toast(message) {
      $('toast').textContent = message;
      $('toast').classList.add('show');
      setTimeout(() => $('toast').classList.remove('show'), 2200);
    }

    function shortKey(pk) { return pk ? pk.slice(0, 8) + '…' + pk.slice(-6) : ''; }
    function npub(pk) { try { return nip19.npubEncode(pk); } catch { return pk || ''; } }
    function fmtTime(ts) {
      const diff = Math.max(1, Math.floor(Date.now() / 1000 - ts));
      if (diff < 60) return diff + '秒';
      if (diff < 3600) return Math.floor(diff / 60) + '分';
      if (diff < 86400) return Math.floor(diff / 3600) + '時間';
      return new Date(ts * 1000).toLocaleDateString('ja-JP');
    }
    function avatarFor(pubkey) {
      const meta = state.metadata.get(pubkey);
      return meta?.picture || `data:image/svg+xml,${encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='96' height='96'><rect width='96' height='96' fill='#ccc'/><text x='50%' y='54%' dominant-baseline='middle' text-anchor='middle' font-size='32' font-family='Arial' fill='#111'>${(pubkey || '?').slice(0,2)}</text></svg>`)}`;
    }
    function nameFor(pubkey) {
      const meta = state.metadata.get(pubkey);
      return meta?.display_name || meta?.name || shortKey(pubkey);
    }

    function renderRelays() {
      $('relayList').innerHTML = state.relays.map(r => `<div class="relay"><span><i class="dot"></i>${r}</span></div>`).join('');
    }

    function renderProfile() {
      $('profileName').textContent = state.pubkey ? nameFor(state.pubkey) : '匿名ユーザー';
      $('profilePubkey').textContent = state.pubkey ? npub(state.pubkey) : '未ログイン';
      $('myAvatar').src = state.pubkey ? avatarFor(state.pubkey) : avatarFor('??');
      postBtn.disabled = !state.pubkey || postText.value.trim().length === 0;
    }

    function renderFeed() {
      if (!state.pubkey) {
        feed.innerHTML = `<p class="tiny" style="padding:20px;">ログインすると、フォローしている人の投稿だけを表示します。</p>`;
        return;
      }
      if (state.follows.length === 0 && state.events.size === 0) {
        feed.innerHTML = `<p class="tiny" style="padding:20px;">フォローリストを読み込み中です。フォローがない、または kind:3 がリレー上で見つからない場合は投稿が表示されません。</p>`;
        return;
      }
      const notes = [...state.events.values()].sort((a,b) => b.created_at - a.created_at).slice(0, 120);
      feed.innerHTML = notes.map(ev => `
        <article class="note">
          <img class="avatar" src="${avatarFor(ev.pubkey)}" alt="avatar" loading="lazy" />
          <div>
            <div class="note-head">
              <span class="name">${escapeHtml(nameFor(ev.pubkey))}</span>
              <span class="pubkey">@${shortKey(ev.pubkey)}</span>
              <span class="time">${fmtTime(ev.created_at)}前</span>
            </div>
            <div class="content">${linkify(escapeHtml(ev.content))}</div>
            <div class="note-actions"><span>返信</span><span>再投稿</span><span>いいね</span><span>共有</span></div>
          </div>
        </article>`).join('') || `<p class="tiny" style="padding:20px;">フォロー中アカウントの投稿を読み込み中です。</p>`;
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }
    function linkify(s) {
      return s.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noreferrer">$1</a>');
    }

    async function connectWithExtension() {
      if (!window.nostr) return toast('NIP-07 拡張が見つかりません');
      state.pubkey = await window.nostr.getPublicKey();
      state.secretHex = null;
      localStorage.setItem('mono:pubkey', state.pubkey);
      localStorage.removeItem('mono:secretHex');
      renderProfile();
      subscribe();
      toast('NIP-07 で接続しました');
    }

    function createLocalKey() {
      const sk = generateSecretKey();
      state.secretHex = bytesToHex(sk);
      state.pubkey = getPublicKey(sk);
      localStorage.setItem('mono:secretHex', state.secretHex);
      localStorage.setItem('mono:pubkey', state.pubkey);
      renderProfile();
      subscribe();
      toast('ローカル鍵を作成しました');
    }

    async function signEvent(template) {
      if (window.nostr && !state.secretHex) return await window.nostr.signEvent(template);
      if (!state.secretHex) throw new Error('署名鍵がありません');
      return finalizeEvent(template, hexToBytes(state.secretHex));
    }

    async function publishNote() {
      const content = postText.value.trim();
      if (!content || !state.pubkey) return;
      postBtn.disabled = true;
      try {
        const ev = await signEvent({ kind: 1, created_at: Math.floor(Date.now()/1000), tags: [], content });
        state.events.set(ev.id, ev);
        renderFeed();
        const pubs = state.pool.publish(state.relays, ev);
        await Promise.any(pubs);
        postText.value = '';
        $('charCount').textContent = '0';
        toast('投稿しました');
      } catch (err) {
        toast('投稿に失敗しました: ' + (err?.message || err));
      } finally {
        postBtn.disabled = !state.pubkey || postText.value.trim().length === 0;
      }
    }

    function stopSubscriptions() {
      if (state.followSub?.close) state.followSub.close();
      if (state.sub?.close) state.sub.close();
      state.followSub = null;
      state.sub = null;
    }

    function followPubkeysFromEvent(ev) {
      return [...new Set(ev.tags
        .filter(t => t[0] === 'p' && /^[0-9a-f]{64}$/i.test(t[1] || ''))
        .map(t => t[1].toLowerCase()))];
    }

    function subscribe() {
      stopSubscriptions();
      state.events.clear();
      state.follows = [];
      renderFeed();
      if (!state.pubkey) {
        $('connectionStatus').textContent = '未接続';
        return;
      }

      $('connectionStatus').textContent = 'フォロー取得中';
      let latestFollowEvent = null;
      state.followSub = state.pool.subscribeMany(state.relays, [
        { kinds: [3], authors: [state.pubkey], limit: 1 },
        { kinds: [0], authors: [state.pubkey], limit: 1 }
      ], {
        onevent(ev) {
          if (ev.kind === 0) {
            try { state.metadata.set(ev.pubkey, JSON.parse(ev.content)); } catch {}
            renderProfile();
            return;
          }
          if (!latestFollowEvent || ev.created_at > latestFollowEvent.created_at) latestFollowEvent = ev;
        },
        oneose() {
          const follows = latestFollowEvent ? followPubkeysFromEvent(latestFollowEvent) : [];
          subscribeFollowingTimeline(follows);
        }
      });
    }

    function subscribeFollowingTimeline(follows) {
      if (state.sub?.close) state.sub.close();
      state.follows = follows;
      if (follows.length === 0) {
        $('connectionStatus').textContent = 'フォロー 0';
        renderFeed();
        return;
      }

      $('connectionStatus').textContent = `フォロー ${follows.length} 読込中`;
      const since = Math.floor(Date.now()/1000) - 60 * 60 * 24 * 7;
      state.sub = state.pool.subscribeMany(state.relays, [
        { kinds: [1], authors: follows, limit: 120, since },
        { kinds: [0], authors: [state.pubkey, ...follows], limit: follows.length + 1 }
      ], {
        onevent(ev) {
          if (ev.kind === 1 && ev.content && state.follows.includes(ev.pubkey)) state.events.set(ev.id, ev);
          if (ev.kind === 0) {
            try { state.metadata.set(ev.pubkey, JSON.parse(ev.content)); } catch {}
          }
          renderProfile();
          renderFeed();
        },
        oneose() { $('connectionStatus').textContent = `フォロー ${state.follows.length} / ${state.events.size} notes`; }
      });
    }

    $('connectBtn').onclick = connectWithExtension;
    $('localKeyBtn').onclick = createLocalKey;
    $('refreshBtn').onclick = subscribe;
    $('homeBtn').onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});
    $('copyPubkeyBtn').onclick = async () => {
      if (!state.pubkey) return toast('公開鍵がありません');
      await navigator.clipboard.writeText(npub(state.pubkey));
      toast('公開鍵をコピーしました');
    };
    $('addRelayBtn').onclick = () => {
      const v = $('relayInput').value.trim();
      if (!/^wss:\/\//.test(v)) return toast('wss:// で始まるリレーを入力してください');
      if (!state.relays.includes(v)) state.relays.push(v);
      localStorage.setItem('mono:relays', JSON.stringify(state.relays));
      $('relayInput').value = '';
      renderRelays();
      subscribe();
    };
    postText.addEventListener('input', () => {
      $('charCount').textContent = postText.value.length;
      postBtn.disabled = !state.pubkey || postText.value.trim().length === 0;
    });
    postBtn.onclick = publishNote;

    renderRelays();
    renderProfile();
    renderFeed();
    if (state.pubkey) subscribe();
  </script>
</body>
</html>
